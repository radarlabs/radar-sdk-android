name: PR Checks

on:
  pull_request:
    branches:
      - master

concurrency:
  group: pr-checks-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ktlint + Android Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Configure Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run ktlintCheck
        run: ./gradlew :sdk:ktlintCheck

      - name: Run lintDebug
        run: ./gradlew :sdk:lintDebug

      - name: Upload lint reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            sdk/build/reports/lint-results-debug.html
            sdk/build/reports/lint-results-debug.xml
          retention-days: 7
